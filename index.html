<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vietlott AI Predictor PRO 18</title><style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

.light{
background:white;
color:black;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

/* GAME BOX */

.gamebox{
border:2px solid gold;
border-radius:15px;
padding:15px;
margin-top:15px;
}

/* BUTTON */

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:20px;
background:gold;
color:black;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

/* RESULT BALL */

.ball{
display:inline-block;
width:48px;
height:48px;
line-height:48px;
border-radius:50%;
background:gold;
color:black;
font-weight:bold;
margin:6px;
}

/* LINK STATUS */

.status{
color:#22c55e;
font-weight:bold;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#1e293b;
padding:35px;
border-radius:15px;
width:85%;
max-width:500px;
}

select{
padding:10px;
margin:6px;
font-size:18px;
}

#result{
margin-top:20px;
min-height:70px;
}

/* FIREWORK */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style></head><body><canvas id="firework"></canvas>

<div class="container"><h2>Vietlott AI Predictor PRO 18</h2><div class="status" onclick="openVietlott()">
✓ Đang kết nối thời gian thực đến Vietlott
</div><div class="gamebox"><h3>Dự đoán Vietlott</h3><button onclick="predictMega()">Mega 6/45</button>
<button onclick="predictPower()">Power 6/55</button>

<button onclick="predictKeno()">Keno</button>

<button onclick="predictMax3D()">Max 3D</button>
<button onclick="predictMax3DPlus()">Max 3D+</button>
<button onclick="predictMax3DPro()">Max 3D Pro</button>

<button onclick="predictBingo()">Bingo18</button>
<button onclick="predictLotto()">Lotto 5/35</button>

<br><button onclick="jackpotMega()">AI Jackpot Mega</button>
<button onclick="jackpotPower()">AI Jackpot Power</button>

<br><button onclick="openBirth()">Tạo theo ngày sinh</button>
<button onclick="toggleTheme()">Light / Dark</button>

</div><div id="result"></div></div><!-- POPUP --><div class="popup" id="birthPopup"><div class="popup-box"><h2>Chọn ngày sinh</h2><select id="day"></select>
<select id="month"></select>
<select id="year"></select>

<br><br>

<button onclick="generateBirth()">Tạo bộ số</button>
<button onclick="closeBirth()">Đóng</button>

</div></div><script>

/* SOUND */

function playSound(){

const ctx = new (window.AudioContext || window.webkitAudioContext)()

const o = ctx.createOscillator()

o.type="triangle"
o.frequency.value=650

o.connect(ctx.destination)

o.start()

setTimeout(()=>o.stop(),150)

}

/* VIBRATION */

function vibrate(){

if("vibrate" in navigator){

navigator.vibrate(120)

}

}

/* RANDOM */

function randomUnique(max,count){

let arr=[]

while(arr.length<count){

let n=Math.floor(Math.random()*max)+1

if(!arr.includes(n)) arr.push(n)

}

return arr.sort((a,b)=>a-b)

}

/* SHOW */

function showNumbers(nums,power){

playSound()
vibrate()

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{
r.innerHTML+=`<div class="ball">${n}</div>`
})

if(power){

r.innerHTML+=`<div class="ball" style="background:red;color:white">${power}</div>`

}

firework()

}

function showText(text){

playSound()
vibrate()

document.getElementById("result").innerHTML="<h2>"+text+"</h2>"

firework()

}

/* GAMES */

function predictMega(){

showNumbers(randomUnique(45,6))

}

function predictPower(){

let nums=randomUnique(55,6)

let power=Math.floor(Math.random()*55)+1

showNumbers(nums,power)

}

function predictKeno(){

showNumbers(randomUnique(80,10))

}

function predictMax3D(){

let n=Math.floor(Math.random()*1000).toString().padStart(3,"0")

showText(n)

}

function predictMax3DPlus(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")
let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")

showText(a+" | "+b)

}

function predictMax3DPro(){

predictMax3DPlus()

}

function predictBingo(){

showNumbers(randomUnique(90,18))

}

function predictLotto(){

showNumbers(randomUnique(35,5))

}

/* JACKPOT */

function jackpotMega(){

predictMega()

}

function jackpotPower(){

predictPower()

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* LINK */

function openVietlott(){

window.open("https://vietlott.vn")

}

/* POPUP */

function openBirth(){

document.getElementById("birthPopup").style.display="flex"

}

function closeBirth(){

document.getElementById("birthPopup").style.display="none"

}

/* BIRTH */

function generateBirth(){

let d=day.value
let m=month.value
let y=year.value

let seed=parseInt(d)+parseInt(m)+parseInt(y)

let nums=[]

while(nums.length<6){

let n=(seed*Math.random()*100)%45

n=Math.floor(n)+1

if(!nums.includes(n)) nums.push(n)

}

showNumbers(nums)

closeBirth()

}

/* DROPDOWN */

for(let i=1;i<=31;i++){

day.innerHTML+=`<option>${i}</option>`

}

for(let i=1;i<=12;i++){

month.innerHTML+=`<option>${i}</option>`

}

for(let i=1950;i<=2035;i++){

year.innerHTML+=`<option>${i}</option>`

}

/* FIREWORK */

const canvas=document.getElementById("firework")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){

for(let i=0;i<80;i++){

particles.push({

x:canvas.width/2,
y:canvas.height,
vx:(Math.random()-0.5)*6,
vy:-Math.random()*8,
life:60

})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.vy+=0.1
p.life--

ctx.fillStyle="gold"

ctx.fillRect(p.x,p.y,3,3)

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(animate)

}

animate()

</script></body>
</html>
