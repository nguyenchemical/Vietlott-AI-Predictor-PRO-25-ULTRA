<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Vietlott AI Predictor PRO</title><link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png"><meta name="theme-color" content="#0f172a"><style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
text-align:center;
}

/* splash */

#splash{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

background:#0f172a;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

z-index:9999;

animation:fade 1s ease;

}

@keyframes fade{

from{opacity:0}
to{opacity:1}

}

h1{
margin-top:20px;
}

#status{
color:#22c55e;
margin-bottom:10px;
}

#result{
margin-top:40px;
font-size:30px;
}

/* ball */

.ball{

display:inline-flex;
justify-content:center;
align-items:center;

width:60px;
height:60px;

border-radius:50%;

background:gold;
color:black;

font-weight:bold;

margin:6px;

font-size:22px;

transform:scale(0);

animation:pop .35s forwards;

}

@keyframes pop{
to{transform:scale(1)}
}

/* controls */

.controls{

position:fixed;

bottom:0;
left:0;
right:0;

background:#111827;

padding:10px;

display:flex;
flex-wrap:wrap;
justify-content:center;

}

button{

margin:4px;

padding:10px 12px;

border:none;

border-radius:12px;

background:gold;
color:black;

font-weight:bold;

}

/* popup */

.popup{

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,.85);

display:none;

align-items:center;
justify-content:center;

}

.popup-box{

background:#1e293b;

padding:30px;

border-radius:15px;

}

select{
font-size:18px;
padding:8px;
margin:6px;
}

/* firework */

canvas{

position:fixed;

top:0;
left:0;

pointer-events:none;

}

</style></head><body><div id="splash"><h1>🎰 Vietlott AI Predictor</h1>
<p>Đang khởi động AI...</p></div><h1>Vietlott AI Predictor</h1><div id="status">
✓ Đang kết nối thời gian thực đến Vietlott
</div><canvas id="fx"></canvas>

<div id="result"></div><div class="controls"><button onclick="mega()">Mega 6/45</button>
<button onclick="power()">Power 6/55</button>

<button onclick="aiMega()">AI Jackpot Mega</button>
<button onclick="aiPower()">AI Jackpot Power</button>

<button onclick="keno()">Keno</button>

<button onclick="max3d()">Max 3D</button>
<button onclick="max3dplus()">Max 3D+</button>
<button onclick="max3dpro()">Max 3D Pro</button>

<button onclick="lotto()">Lotto 5/35</button>

<button onclick="birth()">Ngày sinh</button>

<button onclick="toggle()">Light/Dark</button>

</div><div class="popup" id="birthPopup"><div class="popup-box"><h2>Chọn ngày sinh</h2><select id="d"></select>
<select id="m"></select>
<select id="y"></select>

<br><br>

<button onclick="genBirth()">Tạo số</button>
<button onclick="closeBirth()">Đóng</button>

</div></div><script>

/* splash */

setTimeout(()=>{

splash.style.display="none"

},2000)

/* sound */

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()

o.frequency.value=750

o.connect(ctx.destination)

o.start()

setTimeout(()=>o.stop(),120)

}

/* vibrate */

function vibrate(){

if(navigator.vibrate){

navigator.vibrate(120)

}

}

/* random */

function unique(max,count){

let arr=[]

while(arr.length<count){

let n=Math.floor(Math.random()*max)+1

if(!arr.includes(n)) arr.push(n)

}

return arr.sort((a,b)=>a-b)

}

/* show */

async function show(nums,power){

result.innerHTML=""

for(let n of nums){

await new Promise(a=>setTimeout(a,180))

let d=document.createElement("div")

d.className="ball"

d.innerText=n

result.appendChild(d)

sound()

}

if(power){

let p=document.createElement("div")

p.className="ball"

p.style.background="red"

p.style.color="white"

p.innerText=power

result.appendChild(p)

}

vibrate()

firework()

}

/* games */

function mega(){
show(unique(45,6))
}

function power(){

let nums=unique(55,6)

let p=Math.floor(Math.random()*55)+1

show(nums,p)

}

/* AI jackpot */

function aiMega(){

let base=unique(45,6)

show(base)

}

function aiPower(){

let nums=unique(55,6)

let p=Math.floor(Math.random()*55)+1

show(nums,p)

}

/* others */

function keno(){
show(unique(80,10))
}

function max3d(){

let n=Math.floor(Math.random()*1000).toString().padStart(3,"0")

result.innerHTML="<h1>"+n+"</h1>"

sound()

}

function max3dplus(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")

let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")

result.innerHTML="<h1>"+a+" | "+b+"</h1>"

sound()

}

function max3dpro(){

let a=Math.floor(Math.random()*1000).toString().padStart(3,"0")

let b=Math.floor(Math.random()*1000).toString().padStart(3,"0")

let c=Math.floor(Math.random()*1000).toString().padStart(3,"0")

result.innerHTML="<h1>"+a+" | "+b+" | "+c+"</h1>"

sound()

}

function lotto(){

show(unique(35,5))

}

/* birth */

function birth(){

birthPopup.style.display="flex"

}

function closeBirth(){

birthPopup.style.display="none"

}

function genBirth(){

let seed=+d.value+ +m.value+ +y.value

let nums=[]

while(nums.length<6){

let n=(seed*Math.random()*100)%45

n=Math.floor(n)+1

if(!nums.includes(n)) nums.push(n)

}

show(nums)

closeBirth()

}

/* dropdown */

for(let i=1;i<=31;i++) d.innerHTML+=`<option>${i}</option>`
for(let i=1;i<=12;i++) m.innerHTML+=`<option>${i}</option>`
for(let i=1950;i<=2035;i++) y.innerHTML+=`<option>${i}</option>`

/* dark */

let dark=true

function toggle(){

dark=!dark

if(dark){

document.body.style.background="#0f172a"
document.body.style.color="white"

}else{

document.body.style.background="white"
document.body.style.color="black"

}

}

/* firework */

const canvas=document.getElementById("fx")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let parts=[]

function firework(){

for(let i=0;i<70;i++){

parts.push({

x:canvas.width/2,
y:canvas.height,

vx:(Math.random()-.5)*6,
vy:-Math.random()*8,

life:60

})

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

parts.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.vy+=.1

p.life--

ctx.fillStyle="gold"

ctx.fillRect(p.x,p.y,3,3)

})

parts=parts.filter(p=>p.life>0)

requestAnimationFrame(loop)

}

loop()

</script></body>
</html>
