</style></head><body><div id="splash">

function clock(){

let d=new Date()

let day=d.getDate().toString().padStart(2,'0')
let month=(d.getMonth()+1).toString().padStart(2,'0')
let year=d.getFullYear()

let h=d.getHours().toString().padStart(2,'0')
let m=d.getMinutes().toString().padStart(2,'0')
let s=d.getSeconds().toString().padStart(2,'0')

document.getElementById("clock").innerText=
day+"/"+month+"/"+year+" "+h+":"+m+":"+s

}

setInterval(clock,1000)

function rand(max){
return Math.floor(Math.random()*max)+1
}

function unique(count,max){

let arr=[]

while(arr.length<count){

let n=rand(max)

if(!arr.includes(n)) arr.push(n)

}

return arr

}

function show(nums,power,title){

document.getElementById("gameTitle").innerText="рџЋ° "+title

let r=document.getElementById("result")

r.innerHTML=""

nums.forEach(n=>{

let b=document.createElement("div")
b.className="ball"
b.innerText=n
r.appendChild(b)

})

if(power){

let p=document.createElement("div")
p.className="ball power"
p.innerText=power
r.appendChild(p)

}

sound()
vibrate()
firework()
chart()

}

function mega(){
show(unique(6,45),null,"Mega 6/45")
}

function power(){
show(unique(6,55),rand(55),"Power 6/55")
}

function spin(){

document.getElementById("gameTitle").innerText="рџЋ° MГЎy quay sб»‘ Vietlott"

let r=document.getElementById("result")

r.innerHTML="рџЋ° Дђang quay..."

setTimeout(()=>{
mega()
},2000)

}

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")
f.className="fire"
f.style.left=Math.random()*100+"%"
document.body.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

function sound(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()

let o=ctx.createOscillator()
let g=ctx.createGain()

o.connect(g)
g.connect(ctx.destination)

o.frequency.value=700
o.start()

g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5)

}

function vibrate(){

if(navigator.vibrate){
navigator.vibrate([200,100,200])
}

}

function chart(){

let c=document.getElementById("chart")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,300,120)

for(let i=0;i<20;i++){

let x=i*15
let h=Math.random()*100

ctx.fillStyle="#007bff"
ctx.fillRect(x,120-h,10,h)

}

heatmap()

}

function heatmap(){

let h="рџ”Ґ Heatmap: "

for(let i=1;i<=10;i++){

let v=Math.floor(Math.random()*100)

h+=i+"("+v+"%) "

}

document.getElementById("heatmap").innerText=h

}
